services:
  mysql:
    image: mysql:8.4

    container_name: cinestack_mysql

    restart: unless-stopped

    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: sakila

    ports:
      - "3306:3306"

    volumes:
      - mysql_data:/var/lib/mysql

volumes:
  mysql_data:
    external: true
    name: cinestakserver_mysql_data